<script>
  /* trackpad/wheel bridge — claim the wheel for whichever inner pane is under
     the pointer so two-finger scrolling scrolls it (not the parent), except at edges */
  (function () {
    function bridge(el) {
      if (!el || el.__wb) return; el.__wb = 1;
      el.addEventListener('wheel', function (e) {
        var dy = e.deltaY; if (!dy) return;
        var canUp = el.scrollTop > 0;
        var canDown = el.scrollTop + el.clientHeight < el.scrollHeight - 1;
        if ((dy < 0 && canUp) || (dy > 0 && canDown)) { el.scrollTop += dy; e.preventDefault(); }
      }, { passive: false });
    }
    var t = setInterval(function () {
      bridge(document.querySelector('.ml-main'));
      bridge(document.querySelector('.ml-sb__body'));
    }, 500);
    setTimeout(function () { clearInterval(t); }, 12000);
  })();
</script>
