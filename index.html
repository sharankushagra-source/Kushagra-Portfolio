<style>
  /* full-page morphing grid background overrides */
  .bgmorph{ position:fixed; inset:0; z-index:0; pointer-events:none; color:var(--fg); }
  .bgmorph canvas{ position:absolute; inset:0; }
  .hero, .mq, .section, .contact{ position:relative; z-index:1; }
  body{ --grid-line:transparent; background-image:none; }
  .sketch{ background:transparent; color:var(--fg); }
  .sketch .sechead__title{ color:var(--fg); }
  .sketch .lab{ color:color-mix(in srgb, var(--fg) 62%, transparent); }
  .collage-frame{ background:transparent; box-shadow:none; z-index:0; }
  .gallery__stack{ z-index:1; }
  .themebtn .kitlink{ display:inline-flex; align-items:center; font-family:var(--sans); font-weight:800; font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    padding:8px 15px; border-radius:100px; color:color-mix(in srgb, var(--fg) 70%, transparent); text-decoration:none; transition:color .25s, background .25s; }
  .themebtn .kitlink:hover{ background:color-mix(in srgb, var(--fg) 10%, transparent); color:var(--fg); }
</style>
